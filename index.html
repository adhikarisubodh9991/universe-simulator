<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universe Simulator - Stage 03</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="universe-canvas"></canvas>

  <aside class="panel">
    <h1>Spawn Controls</h1>
    <div class="row">
      <button id="spawn-planet">Spawn Planet</button>
      <button id="spawn-moon">Spawn Moon</button>
      <button id="clear-all">Clear Dynamic</button>
    </div>
    <p class="hint">Click spawns around center with random offset.</p>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
